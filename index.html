<!DOCTYPE html>
<html>
<head>
<title>KZStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
background: repeating-linear-gradient(90deg, #00ffff22 0px, #00ffff22 2px, transparent 2px, transparent 40px);
animation:movebg 6s linear infinite;
}

@keyframes movebg{
0%{background-position:0 0;}
100%{background-position:200px 0;}
}

/* INTRO (TETEP SAMA) */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:fadeout 2s ease 3s forwards;
}

#intro img{
width:200px; /* Dikecilin dikit logo intronya */
animation:logoanim 3s ease;
filter:drop-shadow(0 0 20px cyan);
}

@keyframes logoanim{
0%{ transform:scale(0) rotate(-30deg); opacity:0; }
50%{ transform:scale(1.2) rotate(5deg); opacity:1; }
100%{ transform:scale(1); }
}

@keyframes fadeout{
to{ opacity:0; visibility:hidden; }
}

/* overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:0;
}

body *{
position:relative;
z-index:1;
}

h1{
margin-top:30px;
font-size:32px; /* Ukuran h1 dikecilin */
letter-spacing:3px;
text-shadow:0 0 20px cyan;
}

/* CONTAINER BIAR SEJAJAR 2 BARIS */
.container{
display: grid;
grid-template-columns: repeat(2, 1fr); /* Otomatis bagi 2 kolom */
gap: 10px;
padding: 10px;
max-width: 550px;
margin: 20px auto;
}

/* CARD PRODUK VERSI KECIL */
.card{
background:rgba(0,0,0,0.6);
border-radius:10px;
padding:10px;
box-shadow: 0 0 8px cyan; /* Shadow dikecilin biar gak berat */
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow: 0 0 15px magenta;
}

/* GAMBAR PRODUK KECIL */
.product-img{
width:100%;
aspect-ratio: 1/1; /* Biar kotak sempurna */
object-fit: cover;
border-radius:8px;
margin-bottom:5px;
box-shadow:0 0 5px cyan;
}

.card h2{
font-size: 12px; /* Font judul produk kecil */
margin: 5px 0;
}

.card p{
font-size: 11px; /* Font harga kecil */
margin: 0;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:8px;
background:#00ffcc;
font-size: 10px; /* Button text kecil */
font-weight:bold;
cursor:pointer;
width: 100%; /* Tombol full di dalam card */
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index: 10000;
}

.popup img{
margin-top:100px;
width:;
border-radius:10px;
box-shadow:0 0 20px cyan;
}

.close{
font-size:30px;
cursor:pointer;
position: absolute;
top: 20px;
right: 30px;
}

</style>
</head>

<body>

<div id="intro">
<img src="kocakjir.png">
<h2 style="color:cyan">KZSTORE REBEL CITY</h2>
</div>

<h1>KZStore</h1>

<div class="container">

<div class="card">
<img src="tobaco.png" class="product-img">
<h2>1 Backpack Tobaco</h2>
<p>Rp 15.000</p>
<button onclick="beli('qris15.jpg')">BELI</button>
</div>

<div class="card">
<img src="ak47.png" class="product-img">
<h2>1 Backpack AK47</h2>
<p>Rp 15.000</p>
<button onclick="beli('qris20.jpg')">BELI</button>
</div>

<div class="card">
<img src="awp.png" class="product-img">
<h2>1 Backpack AWP</h2>
<p>Rp 25.000</p>
<button onclick="beli('qris25.jpg')">BELI</button>
</div>

</div>

<div class="popup" id="popup">
<span class="close" onclick="tutup()">X</span>
<br>
<img id="qrisgambar">
<p>Scan QRIS untuk pembayaran</p>
</div>

<script>
function beli(gambar){
document.getElementById("popup").style.display="block";
document.getElementById("qrisgambar").src=gambar;
}

function tutup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
